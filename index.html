<!DOCTYPE html>
<html>
<head>
  <title>Veduisback Login</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: Arial, sans-serif;
    }

    .container {
      background: #1e293b;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      text-align: center;
      width: 300px;
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    p {
      color: #cbd5f5;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Login 🚀</h1>

  <button onclick="googleLogin()">Sign in with Google</button>

  <p id="msg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
  getAuth, 
  GoogleAuthProvider, 
  signInWithPopup 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvoBzRgAHBoW373aeiq5i3boJfloBDibM",
  authDomain: "fir-login-803c8.firebaseapp.com",
  projectId: "fir-login-803c8",
  storageBucket: "fir-login-803c8.firebasestorage.app",
  messagingSenderId: "965567895026",
  appId: "1:965567895026:web:1314207e9f0d04881ec76b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const adminEmail = "rachnf99@gmail.com";

// ✅ GOOGLE LOGIN (POPUP)
window.googleLogin = function () {
  signInWithPopup(auth, provider)
    .then((result) => {
      const user = result.user;

      // Store session
      localStorage.setItem("uid", user.uid);
      localStorage.setItem("userEmail", user.email);

      // Redirect
      if (user.email === adminEmail) {
        window.location.href = "admin.html";
      } else {
        window.location.href = "dashboard.html";
      }
    })
    .catch((error) => {
      console.error(error);
      document.getElementById("msg").innerText = error.message;
    });
};
</script>

</body>
</html>
