<!DOCTYPE html>
<html>
<head>
  <title>Veduisback Login</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: Arial, sans-serif;
    }

    .container {
      background: #1e293b;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      text-align: center;
      width: 300px;
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    p {
      color: #cbd5f5;
      font-size: 14px;
    }
  </style>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCvoBzRgAHBoW373aeiq5i3boJfloBDibM",
    authDomain: "fir-login-803c8.firebaseapp.com",
    projectId: "fir-login-803c8",
    storageBucket: "fir-login-803c8.firebasestorage.app",
    messagingSenderId: "965567895026",
    appId: "1:965567895026:web:1314207e9f0d04881ec76b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const adminEmail = "PUT_YOUR_EMAIL_HERE"; // 👈 IMPORTANT

  window.signup = function () {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, user, pass)
      .then(() => {
        document.getElementById("msg").innerText = "Signup Success ✅";
      })
      .catch(err => {
        document.getElementById("msg").innerText = err.message;
      });
  };

  window.login = function () {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, user, pass)
      .then(() => {
        localStorage.setItem("userEmail", user);

        // 🔥 REDIRECT LOGIC
        if (user === adminEmail) {
          window.location.href = "admin.html";
        } else {
          window.location.href = "dashboard.html";
        }
      })
      .catch(() => {
        document.getElementById("msg").innerText = "Login Failed ❌";
      });
  };
</script>
</head>

<body>

<div class="container">
  <h1>Login 🚀</h1>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>


</body>
</html>
