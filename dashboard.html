<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      display: inline-block;
    }
    input {
      display: block;
      margin: 10px auto;
      padding: 8px;
      border-radius: 6px;
      border: none;
      width: 200px;
    }
    button {
      padding: 10px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      cursor: pointer;
    }
    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>User Details</h2>

  <input id="name" placeholder="Full Name">
  <input id="nickname" placeholder="Nickname">
  <input id="address" placeholder="Address">

  <button onclick="saveData()">Save</button>
  <button onclick="logout()">Logout</button>

  <p id="msg"></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } 
  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCvoBzRgAHBoW373aeiq5i3boJfloBDibM",
    authDomain: "fir-login-803c8.firebaseapp.com",
    projectId: "fir-login-803c8",
    storageBucket: "fir-login-803c8.firebasestorage.app",
    messagingSenderId: "965567895026",
    appId: "1:965567895026:web:1314207e9f0d04881ec76b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const uid = localStorage.getItem("uid");

  // 🔐 Protect page (must be logged in)
  if (!uid) {
    window.location.href = "index.html";
  }

  // 🔄 Load existing data (prefill)
  async function loadData() {
    const docRef = doc(db, "users", uid);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      const data = docSnap.data();
      document.getElementById("name").value = data.name || "";
      document.getElementById("nickname").value = data.nickname || "";
      document.getElementById("address").value = data.address || "";
    }
  }

  loadData();

  // 💾 Save data
  window.saveData = async function () {
    if (!uid) {
      document.getElementById("msg").innerText = "Not logged in ❌";
      return;
    }

    await setDoc(doc(db, "users", uid), {
      name: document.getElementById("name").value,
      nickname: document.getElementById("nickname").value,
      address: document.getElementById("address").value,
      email: localStorage.getItem("userEmail")
    });

    document.getElementById("msg").innerText = "Data Saved ✅";
  };
</script>

<script>
  function logout() {
    localStorage.clear();
    window.location.href = "index.html";
  }
</script>

</body>
</html>
