<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      display: inline-block;
    }
    input {
      display: block;
      margin: 10px auto;
      padding: 8px;
      border-radius: 6px;
      border: none;
      width: 200px;
    }
    button {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      background: #38bdf8;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>User Details</h2>

  <input id="name" placeholder="Full Name">
  <input id="nickname" placeholder="Nickname">
  <input id="address" placeholder="Address">

  <button id="saveBtn">Save</button>
  <button id="logoutBtn">Logout</button>

  <p id="msg"></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } 
  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCvoBzRgAHBoW373aeiq5i3boJfloBDibM",
    authDomain: "fir-login-803c8.firebaseapp.com",
    projectId: "fir-login-803c8",
    storageBucket: "fir-login-803c8.firebasestorage.app",
    messagingSenderId: "965567895026",
    appId: "1:965567895026:web:1314207e9f0d04881ec76b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const uid = localStorage.getItem("uid");

  // 🔐 protect page
  if (!uid) {
    window.location.href = "index.html";
  }

  // 🔄 load existing data
  async function loadData() {
    const docRef = doc(db, "users", uid);
    const snap = await getDoc(docRef);

    if (snap.exists()) {
      const d = snap.data();
      document.getElementById("name").value = d.name || "";
      document.getElementById("nickname").value = d.nickname || "";
      document.getElementById("address").value = d.address || "";
    }
  }

  loadData();

  // 💾 SAVE BUTTON FIX
  document.getElementById("saveBtn").addEventListener("click", async () => {
    await setDoc(doc(db, "users", uid), {
      name: document.getElementById("name").value,
      nickname: document.getElementById("nickname").value,
      address: document.getElementById("address").value,
      email: localStorage.getItem("userEmail")
    });

    document.getElementById("msg").innerText = "Data Saved ✅";
  });

  // 🚪 LOGOUT FIX
  document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.clear();
    window.location.href = "index.html";
  });

</script>

</body>
</html>
